services:
  db:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: lab1db_owner
      POSTGRES_PASSWORD: lab1db_password
      POSTGRES_DB: lab1db
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - ./исходные данные:/data
